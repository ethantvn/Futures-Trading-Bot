# Backtest engine + strategy parameters.
# Engine costs default to the Lucid config placeholders; override here.
engine:
  qty: 1                    # micro contracts per trade (sizing studies: Phase 4)
  flat_time: "15:55"        # ET force-flat (Lucid requires flat by 16:45 ET)
  no_entry_after: "15:30"   # ET
  commission_per_side: 0.50 # Lucid MNQ micro, verified 2026-07-12
  exchange_fees_per_side: 0.0
  slippage_ticks: 1

strategies:
  opening_range_breakout:
    max_trades_per_day: 1
    params:
      range_minutes: 30
      target_r: 2.0
      expire_minutes: 90

  prev_day_hl_breakout:
    max_trades_per_day: 1
    params:
      atr_n: 14
      stop_atr: 1.5
      target_r: 2.0
      expire_minutes: 300

  vwap_pullback:
    max_trades_per_day: 3
    params:
      ema_fast: 20
      ema_slow: 50
      atr_n: 14
      stop_atr: 1.5
      target_r: 2.0
      expire_minutes: 45

  ema_trend:
    max_trades_per_day: 3
    params:
      ema_fast: 9
      ema_slow: 21
      ema_filter: 50
      atr_n: 14
      stop_atr: 2.0
      target_r: 3.0

  bollinger_mean_reversion:
    max_trades_per_day: 4
    max_hold_minutes: 90
    params:
      bb_n: 20
      bb_k: 2.0
      adx_n: 14
      adx_max: 20.0
      atr_n: 14
      stop_atr: 1.5

  # ---- Phase 7 candidates ------------------------------------------------
  # ORB + consistency gates. All gates default OFF (behaves exactly like
  # opening_range_breakout); Phase 7 walk-forward selects the band.
  orb_filtered:
    max_trades_per_day: 1
    params:
      range_minutes: 30
      target_r: 1.5
      expire_minutes: 120
      min_width_ratio: 0.0     # OR width / EWM(prev daily RTH ranges) lower gate
      max_width_ratio: 1.0e+9  # upper gate (1e9 = off)
      vol_ref_days: 14
      skip_weekdays: []        # ISO weekday numbers to skip (1 = Monday)
      exit_minute: null        # ET minute-of-day time exit (e.g. 810 = 13:30)

  # ORB gated on prior-day volatility compression (NR-n / inside day).
  nr7_orb:
    max_trades_per_day: 1
    params:
      range_minutes: 30
      target_r: 1.5
      expire_minutes: 120
      nr_n: 7
      mode: either             # nr | inside | either

  # Afternoon (13:00-14:00 ET) range breakout into the close.
  afternoon_breakout:
    max_trades_per_day: 1
    params:
      range_start_minute: 780  # 13:00 ET
      range_minutes: 60
      target_r: 1.5
      expire_minutes: 60
      with_trend_filter: true  # trade only on the session-VWAP side
