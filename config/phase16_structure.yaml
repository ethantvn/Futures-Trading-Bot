# Phase 16 — Structure / Levels / Profile / MES Divergence (MNQ Lucid 25K)

splits:
  grid_start: 2019-06-01
  grid_end: 2025-12-31
  holdout_start: 2026-01-01
  holdout_end: 2026-06-28

walk_forward:
  first_train_start: 2019-06-01
  last_test_end: 2025-12-31
  train_months: 24
  test_months: 6
  min_trades_train: 30

monte_carlo:
  n_attempts: 10000
  max_days: 60
  seed: 42
  contracts: [1]
  accounts: [lucid_25k]
  primary_account: lucid_25k

stress:
  slippage_ticks: [0, 1, 2]
  period_start: 2025-01-01
  period_end: 2025-12-31

# Incumbent ORB-W long-only + skipMon ledger for leaderboard baseline
baseline:
  name: "ORB-W long-only + skipMon (incumbent)"
  trades_parquet: data/processed/trades_phase9_orb_longonly_wf_oos.parquet
  skip_monday: true

families:
  structure_gated_orb:
    strategy: structure_gated_orb
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.25]
      max_width_ratio: [0.7]
      long_only: [true]
      skip_weekdays: [[1]]
      pivot_n: [2, 3, 5]
      allow_regimes: ["up,range", "up", "range"]

  structure_gated_vwap:
    strategy: structure_gated_vwap
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [reversion, pullback]
      pivot_n: [3]
      band_atr: [0.75, 1.25]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5]
      expire_minutes: [45, 90]
      entry_start_minute: [600]
      entry_end_minute: [900]

  overnight_break:
    strategy: overnight_levels
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      mode: [break]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5, 2.0]
      expire_minutes: [90, 150]
      require_pdh_confluence: [false, true]
      tick: [0.25]
      entry_start_minute: [575]
      entry_end_minute: [720]

  overnight_fade:
    strategy: overnight_levels
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [fade]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5]
      expire_minutes: [60, 120]
      require_pdh_confluence: [false, true]
      tick: [0.25]
      entry_start_minute: [575]
      entry_end_minute: [720]

  prior_day_break:
    strategy: prior_day_levels
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      mode: [break]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5, 2.0]
      expire_minutes: [120, 180]
      structure_gate: [false, true]
      allow_regimes: ["up,range"]
      tick: [0.25]

  prior_day_fade:
    strategy: prior_day_levels
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [fade]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5]
      expire_minutes: [90, 150]
      structure_gate: [false, true]
      allow_regimes: ["range"]
      tick: [0.25]

  poc_reversion:
    strategy: poc_value_area
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [reversion]
      bin_size: [5.0, 10.0, 20.0]
      stop_atr: [1.0, 1.5]
      target_r: [1.0, 1.5]
      expire_minutes: [60, 120]
      entry_start_minute: [600]
      entry_end_minute: [900]

  poc_breakout:
    strategy: poc_value_area
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      mode: [breakout]
      bin_size: [10.0, 20.0]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5, 2.0]
      expire_minutes: [90, 150]
      entry_start_minute: [600]
      entry_end_minute: [900]

  mes_agree_orb:
    strategy: mes_divergence_orb
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      mes_mode: [agree]
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.25]
      max_width_ratio: [0.7]
      long_only: [true]
      skip_weekdays: [[1], []]
      mes_path: ["data/processed/mes/continuous_5m.parquet"]

  mes_diverge_orb:
    strategy: mes_divergence_orb
    timeframe_minutes: 5
    max_trades_per_day: 1
    param_grid:
      mes_mode: [diverge]
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.25]
      max_width_ratio: [0.7]
      long_only: [true, false]
      skip_weekdays: [[1]]
      mes_path: ["data/processed/mes/continuous_5m.parquet"]

  round_fade:
    strategy: round_number_magnet
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [fade]
      round_step: [50.0, 100.0]
      stop_atr: [1.0, 1.5]
      target_r: [1.0, 1.5]
      expire_minutes: [45, 90]
      entry_end_minute: [660]
      tick: [0.25]

  round_break:
    strategy: round_number_magnet
    timeframe_minutes: 5
    max_trades_per_day: 2
    param_grid:
      mode: [break]
      round_step: [50.0, 100.0]
      stop_atr: [1.25, 1.75]
      target_r: [1.0, 1.5]
      expire_minutes: [45, 90]
      entry_end_minute: [660]
      tick: [0.25]
