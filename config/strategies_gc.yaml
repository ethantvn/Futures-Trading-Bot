# GC (full-size COMEX) backtest engine costs.
# Full-size GC: $100/pt, $10/tick. Commission/fees are NOT micro MNQ placeholders.
engine:
  qty: 1                         # 1 full-size GC contract
  flat_time: "16:55"             # ET force-flat before Globex maintenance
  no_entry_after: "16:00"
  commission_per_side: 2.50        # VERIFY — typical retail all-in placeholder
  exchange_fees_per_side: 1.50     # VERIFY — CME/COMEX + NFA
  slippage_ticks: 1                # 1 tick = $10 on GC

strategies:
  gc_session_orb:
    max_trades_per_day: 1
    params:
      anchor_minute: 500           # 8:20 ET COMEX default
      range_minutes: 30
      target_r: 1.0
      expire_minutes: 120
      tick: 0.10
      min_width_ratio: 0.0
      max_width_ratio: 1.0e+9
      vol_ref_days: 14
      max_risk_points: null

  gc_nr_orb:
    max_trades_per_day: 1
    params:
      anchor_minute: 500
      range_minutes: 30
      target_r: 1.0
      expire_minutes: 120
      tick: 0.10
      nr_n: 7
      mode: either
      max_risk_points: 4.0

  gc_macro_breakout:
    max_trades_per_day: 1
    params:
      macro_kind: nfp_cpi
      release_minute: 510
      pre_range_minutes: 30
      target_r: 1.0
      expire_minutes: 90
      tick: 0.10
      max_risk_points: 4.0

  gc_vwap_trend:
    max_trades_per_day: 2
    params:
      stop_atr: 1.5
      target_r: 1.5
      expire_minutes: 60
      entry_start_minute: 540
      max_risk_points: 4.0

  gc_vwap_reversion:
    max_trades_per_day: 2
    params:
      extension_atr: 2.0
      stop_atr: 1.0
      target_r: 1.0
      expire_minutes: 45
      entry_start_minute: 540
      max_risk_points: 4.0
