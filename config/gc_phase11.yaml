# Phase 11: Gold (GC full-size) Lucid Flex 50K research.
# 5 years data (2021-06 → 2026-07). Holdout 2026 touched ONCE via --holdout.

splits:
  grid_start: 2021-06-11
  grid_end: 2025-12-31
  holdout_start: 2026-01-01
  holdout_end: 2026-07-10

walk_forward:
  first_train_start: 2021-06-11
  last_test_end: 2025-12-31
  train_months: 18
  test_months: 6
  min_trades_train: 25

monte_carlo:
  n_attempts: 10000
  max_days: 60
  seed: 42
  contracts: [1]
  account: lucid_50k

stress:
  slippage_ticks: [0, 1, 2]
  period_start: 2025-01-01
  period_end: 2025-12-31

# Lucid 50K MLL $2,000 — target 15-25% per trade = $300-500 at 1 GC contract.
sizing:
  mll: 2000
  risk_pct_low: 0.15
  risk_pct_high: 0.25
  point_value: 100.0

families:
  comex_orb:
    strategy: gc_session_orb
    max_trades_per_day: 1
    param_grid:
      anchor_minute: [500]
      range_minutes: [30, 60]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.0, 0.25]
      max_width_ratio: [0.7, 1.0e+9]
      max_risk_points: [3.0, 4.0, 5.0]

  ny_orb:
    strategy: gc_session_orb
    max_trades_per_day: 1
    param_grid:
      anchor_minute: [570]
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.0, 0.25]
      max_width_ratio: [0.7, 1.0e+9]
      max_risk_points: [3.0, 4.0, 5.0]

  london_orb:
    strategy: gc_session_orb
    max_trades_per_day: 1
    param_grid:
      anchor_minute: [330]
      range_minutes: [30, 60]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      min_width_ratio: [0.0]
      max_width_ratio: [1.0e+9]
      max_risk_points: [3.0, 4.0, 5.0]

  globex_orb:
    strategy: gc_session_orb
    max_trades_per_day: 1
    param_grid:
      anchor_minute: [1080]
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [90]
      min_width_ratio: [0.0]
      max_width_ratio: [1.0e+9]
      max_risk_points: [3.0, 4.0]

  nr_comex:
    strategy: gc_nr_orb
    max_trades_per_day: 1
    param_grid:
      anchor_minute: [500]
      range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [120]
      nr_n: [5, 7]
      mode: [either]
      max_risk_points: [4.0]

  macro_nfp_cpi:
    strategy: gc_macro_breakout
    max_trades_per_day: 1
    param_grid:
      macro_kind: [nfp_cpi]
      release_minute: [510]
      pre_range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [90]
      max_risk_points: [3.0, 4.0, 5.0]

  macro_fomc:
    strategy: gc_macro_breakout
    max_trades_per_day: 1
    param_grid:
      macro_kind: [fomc]
      release_minute: [840]
      pre_range_minutes: [30]
      target_r: [1.0, 1.5]
      expire_minutes: [90]
      max_risk_points: [3.0, 4.0, 5.0]

  vwap_trend:
    strategy: gc_vwap_trend
    max_trades_per_day: 2
    param_grid:
      stop_atr: [1.5, 2.0]
      target_r: [1.0, 1.5]
      expire_minutes: [60]
      entry_start_minute: [540]
      max_risk_points: [3.0, 4.0]

  vwap_reversion:
    strategy: gc_vwap_reversion
    max_trades_per_day: 2
    param_grid:
      extension_atr: [1.5, 2.0]
      stop_atr: [1.0]
      target_r: [1.0]
      expire_minutes: [45]
      entry_start_minute: [540]
      max_risk_points: [3.0, 4.0]

# Baseline: macro release days vs non-release (expectancy only, no WF grid).
macro_baseline:
  enabled: true
